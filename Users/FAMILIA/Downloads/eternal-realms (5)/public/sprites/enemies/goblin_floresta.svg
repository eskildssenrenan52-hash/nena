    <path d="M35 65 L50 35 L65 65 Z" fill="#22543d"/><circle cx="50" cy="35" r="12" fill="#2f855a"/><path d="M34 30 L42 34 L38 38 Z" fill="#2f855a"/><path d="M66 30 L58 34 L62 38 Z" fill="#2f855a"/><circle cx="46" cy="35" r="2" fill="#e53e3e"/><circle cx="54" cy="35" r="2" fill="#e53e3e"/>
  </g>
</svg>