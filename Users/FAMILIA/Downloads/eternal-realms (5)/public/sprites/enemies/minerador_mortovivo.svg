<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <radialGradient id="enemyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a0aec0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a0aec0" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowEffect">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#enemyGlow)" />
  
  <g filter="url(#glowEffect)">
    <!-- Base monster shape -->
    <rect x="38" y="48" width="24" height="30" fill="#718096"/><circle cx="50" cy="38" r="10" fill="#a0aec0"/><rect x="42" y="24" width="16" height="6" fill="#ecc94b"/><circle cx="46" cy="38" r="1.5" fill="#e53e3e"/><circle cx="54" cy="38" r="1.5" fill="#e53e3e"/>
  </g>
</svg>