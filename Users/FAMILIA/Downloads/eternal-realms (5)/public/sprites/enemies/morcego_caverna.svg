<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <radialGradient id="enemyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4a5568" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4a5568" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowEffect">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#enemyGlow)" />
  
  <g filter="url(#glowEffect)">
    <!-- Base monster shape -->
    <circle cx="50" cy="45" r="8" fill="#4a5568"/><path d="M50 45 Q25 30 15 50 Q30 50 50 45" fill="#2d3748"/><path d="M50 45 Q75 30 85 50 Q70 50 50 45" fill="#2d3748"/><circle cx="47" cy="43" r="1.5" fill="#e53e3e"/><circle cx="53" cy="43" r="1.5" fill="#e53e3e"/>
  </g>
</svg>