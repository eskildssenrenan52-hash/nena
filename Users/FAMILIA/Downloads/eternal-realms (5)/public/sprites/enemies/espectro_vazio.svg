<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <radialGradient id="enemyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#805ad5" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#805ad5" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowEffect">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#enemyGlow)" />
  
  <g filter="url(#glowEffect)">
    <!-- Base monster shape -->
    <path d="M35 75 Q50 25 50 20 Q50 25 65 75 Z" fill="#1a202c" opacity="0.8"/><circle cx="50" cy="38" r="10" fill="#805ad5"/><circle cx="46" cy="36" r="1.5" fill="#fff"/><circle cx="54" cy="36" r="1.5" fill="#fff"/>
  </g>
</svg>