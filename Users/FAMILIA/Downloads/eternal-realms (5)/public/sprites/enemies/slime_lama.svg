<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <radialGradient id="enemyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#744210" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#744210" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowEffect">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#enemyGlow)" />
  
  <g filter="url(#glowEffect)">
    <!-- Base monster shape -->
    <ellipse cx="50" cy="58" rx="24" ry="16" fill="#744210"/><ellipse cx="44" cy="54" rx="2" ry="2" fill="#38a169"/><ellipse cx="56" cy="54" rx="2" ry="2" fill="#38a169"/>
  </g>
</svg>