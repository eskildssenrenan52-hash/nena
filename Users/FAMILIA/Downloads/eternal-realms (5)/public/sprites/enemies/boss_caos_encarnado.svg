<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <radialGradient id="enemyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b7791f" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#b7791f" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowEffect">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#enemyGlow)" />
  
  <g filter="url(#glowEffect)">
    <!-- Base monster shape -->
    <circle cx="50" cy="35" r="16" fill="#1a202c" stroke="#b7791f" stroke-width="3"/><path d="M20 85 L50 42 L80 85 Z" fill="#1a202c" stroke="#744210" stroke-width="2"/><circle cx="50" cy="35" r="8" fill="#e53e3e"/><path d="M30 15 L50 5 L70 15" fill="none" stroke="#b7791f" stroke-width="4"/><circle cx="50" cy="35" r="4" fill="#000"/>
  </g>
</svg>