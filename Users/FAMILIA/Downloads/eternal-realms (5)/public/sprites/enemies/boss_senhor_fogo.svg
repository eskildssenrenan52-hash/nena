<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <radialGradient id="enemyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f56565" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#f56565" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowEffect">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#enemyGlow)" />
  
  <g filter="url(#glowEffect)">
    <!-- Base monster shape -->
    <circle cx="50" cy="35" r="16" fill="#f56565"/><path d="M25 80 L50 42 L75 80 Z" fill="#c53030"/><path d="M20 40 Q50 10 80 40" fill="none" stroke="#ed8936" stroke-width="5"/><circle cx="44" cy="35" r="3.5" fill="#fff"/><circle cx="56" cy="35" r="3.5" fill="#fff"/>
  </g>
</svg>