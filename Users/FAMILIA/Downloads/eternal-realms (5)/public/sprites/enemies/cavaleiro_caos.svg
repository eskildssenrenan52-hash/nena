<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <radialGradient id="enemyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#44337a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#44337a" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowEffect">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#enemyGlow)" />
  
  <g filter="url(#glowEffect)">
    <!-- Base monster shape -->
    <rect x="36" y="46" width="28" height="32" rx="4" fill="#1a202c" stroke="#44337a" stroke-width="2"/><circle cx="50" cy="34" r="10" fill="#1a202c"/><path d="M42 34 L58 34 L50 20 Z" fill="#44337a"/>
  </g>
</svg>