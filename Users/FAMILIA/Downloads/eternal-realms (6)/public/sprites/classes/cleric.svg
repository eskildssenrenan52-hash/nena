<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Background Glow -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#dd6b20" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#dd6b20" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#glow)" />
  
  <g filter="url(#shadow)">
    <!-- Base Body/Cape -->
    <path d="M35 75 L50 45 L65 75 Z" fill="#2d3748" />
    <path d="M38 75 L50 40 L62 75 Z" fill="#dd6b20" opacity="0.8" />
    
    <!-- Body Armour -->
    <rect x="42" y="48" width="16" height="24" rx="4" fill="#4a5568" stroke="#dd6b20" stroke-width="1.5" />
    <rect x="45" y="52" width="10" height="15" rx="2" fill="#1a202c" />
    
    <!-- Shoulders -->
    <circle cx="40" cy="50" r="5" fill="#dd6b20" />
    <circle cx="60" cy="50" r="5" fill="#dd6b20" />
    
    <!-- Head/Helmet -->
    <circle cx="50" cy="38" r="10" fill="#e2e8f0" stroke="#4a5568" stroke-width="2" />
    <!-- Helmet Visor / Hood -->
    <path d="M42 35 Q50 30 58 35 L55 44 L45 44 Z" fill="#1a202c" stroke="#dd6b20" stroke-width="1" />
    <!-- Eyes -->
    <circle cx="47" cy="38" r="1.5" fill="#dd6b20" />
    <circle cx="53" cy="38" r="1.5" fill="#dd6b20" />
    
    <!-- Extra details based on skin/class -->
    <path d="M25 45 Q35 40 40 45 L40 60 Q32 68 25 60 Z" fill="#ecc94b" stroke="#dd6b20" stroke-width="1.5"/>
               <path d="M30 48 L35 48 L35 57 L30 54 Z" fill="#fff" opacity="0.7"/>
  </g>
</svg>