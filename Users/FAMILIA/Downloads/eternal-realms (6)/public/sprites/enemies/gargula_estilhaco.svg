<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <radialGradient id="enemyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3182ce" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3182ce" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowEffect">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#enemyGlow)" />
  
  <g filter="url(#glowEffect)">
    <!-- Base monster shape -->
    <path d="M30 65 L50 35 L70 65 Z" fill="#2b6cb0"/><polygon points="20,40 35,50 30,70" fill="#3182ce"/><polygon points="80,40 65,50 70,70" fill="#3182ce"/><circle cx="46" cy="45" r="2.5" fill="#ed64a6"/><circle cx="54" cy="45" r="2.5" fill="#ed64a6"/>
  </g>
</svg>