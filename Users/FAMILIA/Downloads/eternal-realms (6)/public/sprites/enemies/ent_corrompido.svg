<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <radialGradient id="enemyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#744210" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#744210" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowEffect">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#enemyGlow)" />
  
  <g filter="url(#glowEffect)">
    <!-- Base monster shape -->
    <rect x="42" y="30" width="16" height="50" fill="#482705" rx="4"/><path d="M30 45 L45 42 L35 30 Z" fill="#744210"/><path d="M70 45 L55 42 L65 30 Z" fill="#744210"/><circle cx="46" cy="45" r="2.5" fill="#ecc94b"/><circle cx="54" cy="45" r="2.5" fill="#ecc94b"/>
  </g>
</svg>