<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <radialGradient id="enemyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#63b3ed" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#63b3ed" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowEffect">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#enemyGlow)" />
  
  <g filter="url(#glowEffect)">
    <!-- Base monster shape -->
    <polygon points="50,20 65,45 50,70 35,45" fill="#63b3ed" stroke="#fff" stroke-width="1.5"/><polygon points="50,30 58,45 50,60 42,45" fill="#fff" opacity="0.5"/>
  </g>
</svg>