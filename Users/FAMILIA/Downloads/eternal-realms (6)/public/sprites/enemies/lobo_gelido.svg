<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <radialGradient id="enemyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cbd5e1" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#cbd5e1" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowEffect">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#enemyGlow)" />
  
  <g filter="url(#glowEffect)">
    <!-- Base monster shape -->
    <path d="M30 65 L45 45 L70 65 Z" fill="#94a3b8"/><circle cx="42" cy="48" r="8" fill="#cbd5e1"/><polygon points="35,42 38,32 42,40" fill="#cbd5e1"/><circle cx="40" cy="46" r="1.5" fill="#3182ce"/>
  </g>
</svg>