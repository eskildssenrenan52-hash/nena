<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <radialGradient id="enemyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ecc94b" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ecc94b" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowEffect">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#enemyGlow)" />
  
  <g filter="url(#glowEffect)">
    <!-- Base monster shape -->
    <circle cx="50" cy="30" r="15" fill="#fff" stroke="#ecc94b" stroke-width="3"/><path d="M25 80 L50 38 L75 80 Z" fill="#3182ce"/><path d="M10 40 Q30 20 45 45 Z" fill="#ecc94b" opacity="0.7"/><path d="M90 40 Q70 20 55 45 Z" fill="#ecc94b" opacity="0.7"/>
  </g>
</svg>