<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <radialGradient id="enemyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cbd5e1" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#cbd5e1" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowEffect">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#enemyGlow)" />
  
  <g filter="url(#glowEffect)">
    <!-- Base monster shape -->
    <line x1="50" y1="35" x2="50" y2="75" stroke="#cbd5e1" stroke-width="4"/><line x1="35" y1="45" x2="65" y2="45" stroke="#cbd5e1" stroke-width="3"/><circle cx="50" cy="28" r="8" fill="#cbd5e1"/><circle cx="47" cy="28" r="1.5" fill="#e53e3e"/><circle cx="53" cy="28" r="1.5" fill="#e53e3e"/>
  </g>
</svg>