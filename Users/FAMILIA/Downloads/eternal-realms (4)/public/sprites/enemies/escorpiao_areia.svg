<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <radialGradient id="enemyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#dd6b20" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#dd6b20" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowEffect">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#enemyGlow)" />
  
  <g filter="url(#glowEffect)">
    <!-- Base monster shape -->
    <rect x="35" y="55" width="30" height="20" rx="8" fill="#b7791f"/><path d="M50 55 Q50 30 65 25 Q70 25 68 32" fill="none" stroke="#dd6b20" stroke-width="4"/><circle cx="40" cy="62" r="1.5" fill="#000"/><circle cx="60" cy="62" r="1.5" fill="#000"/>
  </g>
</svg>