<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <radialGradient id="enemyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e2e8f0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#e2e8f0" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowEffect">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#enemyGlow)" />
  
  <g filter="url(#glowEffect)">
    <!-- Base monster shape -->
    <path d="M30 65 Q50 25 70 65 Z" fill="#e2e8f0" opacity="0.6"/><circle cx="50" cy="45" r="12" fill="#fff" opacity="0.8"/><circle cx="46" cy="45" r="2" fill="#3182ce"/><circle cx="54" cy="45" r="2" fill="#3182ce"/>
  </g>
</svg>