<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <radialGradient id="enemyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#319795" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#319795" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowEffect">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#enemyGlow)" />
  
  <g filter="url(#glowEffect)">
    <!-- Base monster shape -->
    <path d="M38 75 Q50 50 62 75 Z" fill="#319795"/><circle cx="50" cy="45" r="9" fill="#e2e8f0"/><path d="M42 35 Q50 50 58 35 Z" fill="#2d3748"/><circle cx="47" cy="45" r="1.5" fill="#e53e3e"/>
  </g>
</svg>