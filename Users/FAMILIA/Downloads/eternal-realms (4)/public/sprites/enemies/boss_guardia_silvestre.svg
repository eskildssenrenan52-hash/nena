<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <radialGradient id="enemyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#319795" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#319795" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowEffect">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#enemyGlow)" />
  
  <g filter="url(#glowEffect)">
    <!-- Base monster shape -->
    <circle cx="50" cy="30" r="14" fill="#319795"/><path d="M30 80 L50 40 L70 80 Z" fill="#234e52"/><path d="M25 40 Q50 15 75 40" fill="none" stroke="#48bb78" stroke-width="4"/><circle cx="45" cy="30" r="3" fill="#fff"/><circle cx="55" cy="30" r="3" fill="#fff"/>
  </g>
</svg>