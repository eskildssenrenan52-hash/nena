<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <radialGradient id="enemyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#90cdf4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#90cdf4" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowEffect">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#enemyGlow)" />
  
  <g filter="url(#glowEffect)">
    <!-- Base monster shape -->
    <path d="M35 75 L50 32 L65 75 Z" fill="#3182ce"/><circle cx="50" cy="32" r="12" fill="#90cdf4"/><polygon points="45,15 50,5 55,15" fill="#fff"/><circle cx="46" cy="32" r="2" fill="#1a365d"/><circle cx="54" cy="32" r="2" fill="#1a365d"/>
  </g>
</svg>