<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <radialGradient id="enemyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e53e3e" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#e53e3e" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowEffect">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#enemyGlow)" />
  
  <g filter="url(#glowEffect)">
    <!-- Base monster shape -->
    <path d="M38 70 L50 40 L62 70 Z" fill="#9b2c2c"/><circle cx="50" cy="36" r="9" fill="#e53e3e"/><path d="M42 28 L45 20 L48 26 Z" fill="#9b2c2c"/><path d="M58 28 L55 20 L52 26 Z" fill="#9b2c2c"/><circle cx="47" cy="36" r="1.5" fill="#ecc94b"/><circle cx="53" cy="36" r="1.5" fill="#ecc94b"/>
  </g>
</svg>