<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <radialGradient id="enemyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4fd1c5" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4fd1c5" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowEffect">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#enemyGlow)" />
  
  <g filter="url(#glowEffect)">
    <!-- Base monster shape -->
    <path d="M30 50 Q50 20 70 50 Z" fill="#4fd1c5" opacity="0.8"/><line x1="40" y1="50" x2="40" y2="75" stroke="#319795" stroke-width="2"/><line x1="50" y1="50" x2="50" y2="80" stroke="#319795" stroke-width="2"/><line x1="60" y1="50" x2="60" y2="75" stroke="#319795" stroke-width="2"/>
  </g>
</svg>