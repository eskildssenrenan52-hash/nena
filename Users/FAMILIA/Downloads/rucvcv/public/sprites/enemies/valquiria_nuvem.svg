<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <radialGradient id="enemyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#63b3ed" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#63b3ed" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowEffect">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#enemyGlow)" />
  
  <g filter="url(#glowEffect)">
    <!-- Base monster shape -->
    <path d="M35 75 L50 35 L65 75 Z" fill="#2b6cb0"/><circle cx="50" cy="32" r="10" fill="#63b3ed"/><path d="M20 45 Q35 35 40 50 Z" fill="#fff" opacity="0.8"/><path d="M80 45 Q65 35 60 50 Z" fill="#fff" opacity="0.8"/>
  </g>
</svg>