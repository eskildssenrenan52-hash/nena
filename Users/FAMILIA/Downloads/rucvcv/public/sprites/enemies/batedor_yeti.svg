<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <radialGradient id="enemyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#edf2f7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#edf2f7" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowEffect">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#enemyGlow)" />
  
  <g filter="url(#glowEffect)">
    <!-- Base monster shape -->
    <rect x="34" y="40" width="32" height="38" rx="12" fill="#edf2f7"/><circle cx="50" cy="35" r="10" fill="#edf2f7"/><circle cx="46" cy="35" r="2" fill="#3182ce"/><circle cx="54" cy="35" r="2" fill="#3182ce"/>
  </g>
</svg>