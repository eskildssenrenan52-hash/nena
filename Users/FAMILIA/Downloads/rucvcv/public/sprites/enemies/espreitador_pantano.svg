<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <radialGradient id="enemyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#276749" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#276749" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowEffect">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#enemyGlow)" />
  
  <g filter="url(#glowEffect)">
    <!-- Base monster shape -->
    <rect x="35" y="45" width="30" height="30" rx="6" fill="#1c4532"/><circle cx="43" cy="52" r="3.5" fill="#ecc94b"/><circle cx="57" cy="52" r="3.5" fill="#ecc94b"/>
  </g>
</svg>