<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <radialGradient id="enemyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ecc94b" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ecc94b" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowEffect">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#enemyGlow)" />
  
  <g filter="url(#glowEffect)">
    <!-- Base monster shape -->
    <path d="M35 75 Q50 30 50 25 Q50 30 65 75 Z" fill="#ecc94b" opacity="0.6"/><circle cx="50" cy="40" r="8" fill="#d69e2e"/><circle cx="47" cy="38" r="1.5" fill="#e53e3e"/><circle cx="53" cy="38" r="1.5" fill="#e53e3e"/>
  </g>
</svg>