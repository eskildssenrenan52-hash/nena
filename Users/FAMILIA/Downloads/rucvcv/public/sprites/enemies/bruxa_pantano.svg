<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <radialGradient id="enemyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b7791f" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#b7791f" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowEffect">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#enemyGlow)" />
  
  <g filter="url(#glowEffect)">
    <!-- Base monster shape -->
    <path d="M35 75 L50 40 L65 75 Z" fill="#4a371c"/><circle cx="50" cy="40" r="9" fill="#b7791f"/><polygon points="40,35 50,15 60,35" fill="#2d3748"/><circle cx="47" cy="40" r="1.5" fill="#38a169"/><circle cx="53" cy="40" r="1.5" fill="#38a169"/>
  </g>
</svg>