<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <radialGradient id="enemyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#44337a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#44337a" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowEffect">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#enemyGlow)" />
  
  <g filter="url(#glowEffect)">
    <!-- Base monster shape -->
    <rect x="30" y="40" width="40" height="42" rx="10" fill="#2d3748"/><circle cx="50" cy="32" r="14" fill="#44337a"/><path d="M35 20 Q50 5 65 20" fill="none" stroke="#805ad5" stroke-width="4"/><circle cx="44" cy="32" r="3.5" fill="#48bb78"/><circle cx="56" cy="32" r="3.5" fill="#48bb78"/>
  </g>
</svg>