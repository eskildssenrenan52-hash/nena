<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <radialGradient id="enemyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#718096" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#718096" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowEffect">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#enemyGlow)" />
  
  <g filter="url(#glowEffect)">
    <!-- Base monster shape -->
    <rect x="25" y="35" width="50" height="50" rx="8" fill="#2d3748" stroke="#718096" stroke-width="4"/><circle cx="50" cy="22" r="12" fill="#718096"/><circle cx="45" cy="22" r="2.5" fill="#ed8936"/><circle cx="55" cy="22" r="2.5" fill="#ed8936"/>
  </g>
</svg>