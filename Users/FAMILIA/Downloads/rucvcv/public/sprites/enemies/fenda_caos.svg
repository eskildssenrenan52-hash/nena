<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <radialGradient id="enemyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9f7aea" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#9f7aea" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowEffect">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#enemyGlow)" />
  
  <g filter="url(#glowEffect)">
    <!-- Base monster shape -->
    <polygon points="50,15 65,40 50,85 35,40" fill="#553c9a"/><polygon points="50,25 58,40 50,70 42,40" fill="#9f7aea"/><circle cx="50" cy="40" r="4" fill="#000"/>
  </g>
</svg>