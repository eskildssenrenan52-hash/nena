<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <radialGradient id="enemyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c05621" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#c05621" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowEffect">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="45" fill="url(#enemyGlow)" />
  
  <g filter="url(#glowEffect)">
    <!-- Base monster shape -->
    <path d="M25 60 Q50 45 75 60" fill="none" stroke="#7b341e" stroke-width="8"/><circle cx="30" cy="54" r="6" fill="#c05621"/><circle cx="28" cy="52" r="1.5" fill="#ecc94b"/>
  </g>
</svg>